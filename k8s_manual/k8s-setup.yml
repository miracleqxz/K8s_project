---
- name: Prepare K8s nodes
  hosts: all
  become: true
  tasks:
    - name: Disable SWAP
      shell: |
        swapoff -a
        sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab

    - name: Load kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop: ["overlay", "br_netfilter"]

    - name: Persist kernel modules across reboots
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: Set sysctl parameters
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: yes
      loop:
        - { name: "net.bridge.bridge-nf-call-iptables", value: "1" }
        - { name: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { name: "net.ipv4.ip_forward", value: "1" }

    - name: Install containerd & utils
      apt:
        name:
          ["containerd", "conntrack", "socat", "apt-transport-https", "curl"]
        state: present
        update_cache: yes

    - name: Check if containerd is already configured
      stat:
        path: /etc/containerd/config.toml
      register: containerd_config

    - name: Generate default containerd config
      shell: |
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml
      when: not containerd_config.stat.exists
      notify: Restart Containerd

    - name: Enable systemdCgroup in containerd
      replace:
        path: /etc/containerd/config.toml
        regexp: "SystemdCgroup = false"
        replace: "SystemdCgroup = true"
      notify: Restart Containerd

    - name: Download K8s GPG key
      get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.31/deb/Release.key
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
        mode: "0644"

    - name: Dearmor K8s GPG key
      shell: gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg /etc/apt/keyrings/kubernetes-apt-keyring.asc
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add K8s repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.31/deb/ /"
        state: present
        filename: kubernetes

    - name: Install K8s tools
      apt:
        name:
          - kubelet=1.31.14-1.1
          - kubeadm=1.31.14-1.1
          - kubectl=1.31.14-1.1
        state: present
        update_cache: yes

    - name: Hold K8s packages at current version
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop: ["kubelet", "kubeadm", "kubectl"]

  handlers:
    - name: Restart containerd
      service: name=containerd state=restarted

- name: Configure Master node
  hosts: master
  become: true
  tasks:
    - name: Initialize K8s cluster
      shell: kubeadm init --apiserver-advertise-address=192.168.56.10 --pod-network-cidr=10.244.0.0/16
      register: init_output
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Setup kubeconfig for vagrant user
      shell: |
        mkdir -p /home/vagrant/.kube
        cp -i /etc/kubernetes/admin.conf /home/vagrant/.kube/config
        chown vagrant:vagrant /home/vagrant/.kube/config
      args:
        creates: /home/vagrant/.kube/config

    - name: Install Flannel CNI
      become: false
      shell: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml

    - name: Check if metrics server is installed
      become: false
      shell: kubectl get deployment metrics-server -n kube-system -o name
      register: metrics_check
      failed_when: false
      changed_when: false

    - name: Install metrics server
      become: false
      shell: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
      when: metrics_check.rc != 0

    - name: Check if insecure-tls flag is already set
      become: false
      shell: >
        kubectl get deployment metrics-server -n kube-system
        -o jsonpath='{.spec.template.spec.containers[0].args}'
      register: metrics_args
      changed_when: false

    - name: Patch metrics server to allow insecure TLS (for Vagrant)
      become: false
      shell: >
        kubectl patch deployment metrics-server -n kube-system --type='json'
        -p='[{"op": "add", "path": "/spec/template/spec/containers/0/args/-", "value": "--kubelet-insecure-tls"}]'
      when: "'--kubelet-insecure-tls' not in metrics_args.stdout"

    - name: Wait for metrics server to be ready
      become: false
      shell: kubectl get deployment metrics-server -n kube-system -o jsonpath='{.status.readyReplicas}'
      register: ready_replicas
      until: ready_replicas.stdout == "1"
      retries: 10
      delay: 10
      changed_when: false

    - name: Remove taint
      become: false
      shell: kubectl taint nodes master node-role.kubernetes.io/control-plane:NoSchedule-
      register: taint_result
      failed_when: taint_result.rc != 0 and 'not found' not in taint_result.stderr
      changed_when: taint_result.rc == 0

    - name: Get join command
      shell: kubeadm token create --print-join-command
      register: join_command_raw

    - name: Set join command fact
      set_fact:
        join_command: "{{ join_command_raw.stdout }}"

- name: Configure Worker nodes
  hosts: workers
  become: true
  tasks:
    - name: Join Workers to cluster
      shell: "{{ hostvars['master']['join_command'] }}"
      args:
        creates: /etc/kubernetes/kubelet.conf
