<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="container">
    <h1>Tasks</h1>

    <div id="info" class="info"></div>

    <input type="text" id="search" placeholder="Search tasks..." maxlength="200" class="search-input">

    <form id="task-form" class="task-form">
      <input type="text" id="title" placeholder="Task name" required maxlength="200">
      <textarea id="description" placeholder="Description (optional)" maxlength="1000"></textarea>
      <button type="submit">Add Task</button>
    </form>

    <div id="tasks"></div>
  </div>

  <script src="/app.js"></script>
</body>

</html>
