apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: {{ .Values.backend.image }}:{{ .Values.backend.tag }}
          resources:
            requests:
              memory: {{ .Values.backend.resources.requests.memory }}
            limits:
              memory: {{ .Values.backend.resources.limits.memory }}
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: db-secret
          ports:
            - containerPort: {{ .Values.backend.port }}

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
      name: http
  type: ClusterIP